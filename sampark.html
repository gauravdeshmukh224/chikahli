<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>संपर्क पृष्ठ - खामगांव नगर परिषद</title>

  <!-- Marathi Font -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* Base Styles */
    body {
      font-family: 'Noto Sans Devanagari', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
      color: #333;
      line-height: 1.7;
      animation: fadeInBody 1s ease-in;
      overflow-x: hidden;
    }

    @keyframes fadeInBody {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .content {
      max-width: 550px;
      margin: 30px auto;
      padding: 30px;
      background-color: #ffffffcc;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      animation: fadeInContent 1.2s ease-in-out;
    }

    @keyframes fadeInContent {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    h1 {
      text-align: center;
      color: #1e40af;
      font-size: 32px;
      margin-bottom: 10px;
      text-shadow: 1px 1px 5px rgba(30,64,175,0.3);
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      0% { text-shadow: 1px 1px 5px rgba(30,64,175,0.3); }
      100% { text-shadow: 1px 1px 15px rgba(30,64,175,0.7); }
    }

    p {
      text-align: center;
      font-size: 17px;
      margin-bottom: 30px;
      color: #555;
    }

    /* Form Styles */
    form {
      display: flex;
      flex-direction: column;
      animation: fadeInForm 1.5s ease-in-out;
    }

    @keyframes fadeInForm {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    label {
      margin-bottom: 6px;
      font-weight: 600;
      color: #1e3a8a;
    }

    input, textarea {
      padding: 12px;
      margin-bottom: 18px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #1e40af;
      box-shadow: 0 0 10px rgba(30,64,175,0.3);
      transform: scale(1.02);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      padding: 14px;
      background: linear-gradient(to right, #2563eb, #1e40af);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s ease;
      animation: buttonFade 2s ease-in-out infinite alternate;
    }

    @keyframes buttonFade {
      0% { box-shadow: 0 4px 10px rgba(37,99,235,0.3); }
      100% { box-shadow: 0 6px 20px rgba(37,99,235,0.5); }
    }

    button:hover {
      transform: translateY(-2px) scale(1.02);
      background: linear-gradient(to right, #1e40af, #2563eb);
      box-shadow: 0 8px 25px rgba(37,99,235,0.6);
    }

    /* Contact Info Styling */
    .contact-info {
      margin-top: 30px;
      background: #f0f9ff;
      padding: 20px;
      border-radius: 10px;
      border-left: 4px solid #2563eb;
      animation: fadeInInfo 1.5s ease-in-out;
    }

    @keyframes fadeInInfo {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .contact-info p {
      text-align: left;
      margin: 8px 0;
      font-size: 16px;
    }

    /* Footer Styling */
    .footer {
      text-align: center;
      padding: 12px;
      background-color: #ffffff;
      border-top: 2px solid #2563eb;
      margin-top: 30px;
      font-size: 14px;
      color: #555;
      animation: fadeInFooter 2s ease-in-out;
    }

    @keyframes fadeInFooter {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .content {
        margin: 15px;
        padding: 20px;
      }
      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

  <main class="content">
    <h1>संपर्क करा</h1>
    <p>आपल्याला काही प्रश्न, सूचना किंवा माहिती हवी असल्यास कृपया आमच्याशी संपर्क साधा.</p>

    <form action="#" method="post">
      <label for="name">नाव</label>
      <input type="text" id="name" name="name" required>

      <label for="email">ईमेल</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">फोन नंबर</label>
      <input type="tel" id="phone" name="phone">

      <label for="message">संदेश</label>
      <textarea id="message" name="message" placeholder="आपला संदेश येथे लिहा..." required></textarea>

      <button type="submit">संदेश पाठवा</button>
    </form>

    <!-- Contact Details -->
    <div class="contact-info">
      <p><strong>📍 पत्ता:</strong> चिखली नगर परिषद, चिखली</p>
      <p><strong>📞 फोन:</strong> 07263-XXXXXX</p>
      <p><strong>✉️ ईमेल:</strong> info@chikhali.gov.in</p>
      <p><strong>🕘 कार्यालयीन वेळ:</strong> सकाळी 10 ते संध्याकाळी 5</p>
    </div>

  </main>

  <footer class="footer">
    सर्व हक्क राखीव © 2023 चिखली नगर परिषद
  </footer>

</body>
</html>
