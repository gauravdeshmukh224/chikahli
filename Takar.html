<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>तक्रार नोंदवा - चिखली नगर परिषद</title>

<!-- Marathi Font -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* General Styles */
body {
  font-family: 'Noto Sans Devanagari', sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #e0f0ff, #f4f4f4);
  color: #333;
  line-height: 1.6;
  animation: bodyFade 1.5s ease-in-out;
}

@keyframes bodyFade {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* Main Content Styles */
.content {
  max-width: 400px;
  margin: 40px auto;
  padding: 30px;
  background-color: #ffffff;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  animation: contentFade 1s ease forwards;
}

@keyframes contentFade {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

.content h1 {
  text-align: center;
  color: #007bff;
  margin-bottom: 20px;
  font-size: 36px;
  animation: headingSlide 1s ease forwards;
}

@keyframes headingSlide {
  from { transform: translateY(-30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.content p {
  text-align: center;
  margin-bottom: 30px;
  font-size: 16px;
  color: #555;
  animation: textFade 1.5s ease forwards;
}

@keyframes textFade {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* Form Styles */
form {
  display: flex;
  flex-direction: column;
}

label {
  margin-bottom: 5px;
  font-weight: bold;
  color: #007bff;
  transition: color 0.3s;
}

input, select, textarea {
  padding: 12px;
  margin-bottom: 15px;
  border: 2px solid #ccc;
  border-radius: 6px;
  font-size: 16px;
  width: 100%;
  box-sizing: border-box;
  transition: box-shadow 0.3s, border-color 0.3s;
  opacity: 0;
  transform: translateY(20px);
  animation: fieldFade 0.8s forwards;
}

input:nth-of-type(1) { animation-delay: 0.2s; }
input:nth-of-type(2) { animation-delay: 0.4s; }
input:nth-of-type(3) { animation-delay: 0.6s; }
select { animation-delay: 0.8s; }
textarea { animation-delay: 1s; }

@keyframes fieldFade {
  to { opacity: 1; transform: translateY(0); }
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: #007bff;
  box-shadow: 0 0 8px rgba(0, 123, 255, 0.4);
}

textarea { min-height: 120px; }

button {
  padding: 14px;
  background-color: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
  opacity: 0;
  transform: translateY(20px);
  animation: buttonFade 1s forwards;
  animation-delay: 1.2s;
}

@keyframes buttonFade {
  to { opacity: 1; transform: translateY(0);}
}

button:hover {
  background-color: #0056b3;
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

/* Footer Styles */
.footer {
  text-align: center;
  padding: 15px;
  background-color: #ffffff;
  border-top: 3px solid #007bff;
  margin-top: 40px;
  font-size: 14px;
  color: #555;
}

/* Responsive Design */
@media (max-width: 768px) {
  .content {
    margin: 20px;
    padding: 20px;
  }
  .content h1 {
    font-size: 28px;
  }
}
</style>
</head>
<body>
<main class="content">
<h1>तक्रार नोंदवा</h1>
<p>कृपया आपली तक्रार येथे नोंदवा. आम्ही लवकरात लवकर प्रतिसाद देऊ.</p>

<form action="#" method="post">
  <label for="name">नाव:</label>
  <input type="text" id="name" name="name" required>

  <label for="email">ईमेल:</label>
  <input type="email" id="email" name="email" required>

  <label for="phone">फोन नंबर:</label>
  <input type="tel" id="phone" name="phone" required>

  <label for="complaint-type">तक्रार प्रकार:</label>
  <select id="complaint-type" name="complaint-type" required>
    <option value="">निवडा</option>
    <option value="road">रस्ता</option>
    <option value="water">पाणी</option>
    <option value="electricity">वीज</option>
    <option value="sanitation">स्वच्छता</option>
    <option value="other">इतर</option>
  </select>

  <label for="description">तक्रार वर्णन:</label>
  <textarea id="description" name="description" placeholder="आपली तक्रार येथे लिहा..." required></textarea>

  <button type="submit">तक्रार सबमिट करा</button>
</form>
</main>

<footer class="footer">
  सर्व हक्क राखीव © 2023 चिखली नगर परिषद
</footer>
</body>
</html>
